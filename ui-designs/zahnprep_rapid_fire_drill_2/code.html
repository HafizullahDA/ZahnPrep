<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ZahnPrep - Rapid Fire</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface": "#f6fafa",
                        "on-secondary-container": "#4e6875",
                        "surface-variant": "#dfe3e3",
                        "on-secondary": "#ffffff",
                        "background": "#f6fafa",
                        "surface-container-lowest": "#ffffff",
                        "primary": "#006067",
                        "surface-container-highest": "#dfe3e3",
                        "on-error-container": "#93000a",
                        "on-tertiary-container": "#fff1e9",
                        "on-tertiary-fixed": "#301400",
                        "surface-bright": "#f6fafa",
                        "surface-container-high": "#e5e9e9",
                        "surface-container": "#ebeeef",
                        "on-tertiary-fixed-variant": "#6f3808",
                        "primary-fixed": "#96f1fa",
                        "on-background": "#181c1d",
                        "outline": "#6e797a",
                        "primary-container": "#007b83",
                        "tertiary-fixed-dim": "#ffb785",
                        "on-primary-container": "#d0fbff",
                        "inverse-surface": "#2d3132",
                        "on-surface-variant": "#3e494a",
                        "surface-dim": "#d7dbdb",
                        "on-secondary-fixed": "#011e29",
                        "inverse-primary": "#7ad5dd",
                        "outline-variant": "#bdc9ca",
                        "on-surface": "#181c1d",
                        "primary-fixed-dim": "#7ad5dd",
                        "on-error": "#ffffff",
                        "secondary-container": "#cbe7f6",
                        "on-primary": "#ffffff",
                        "surface-container-low": "#f1f4f4",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#004f54",
                        "error": "#ba1a1a",
                        "secondary-fixed-dim": "#afcbd9",
                        "tertiary-fixed": "#ffdcc6",
                        "on-secondary-fixed-variant": "#304a56",
                        "tertiary-container": "#a05f2e",
                        "error-container": "#ffdad6",
                        "tertiary": "#834718",
                        "secondary-fixed": "#cbe7f6",
                        "on-primary-fixed": "#002022",
                        "secondary": "#48626f",
                        "surface-tint": "#006970",
                        "inverse-on-surface": "#eef1f1"
                    },
                    fontFamily: {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        .timer-gradient {
            background: conic-gradient(from 0deg, #006067 0%, #007b83 75%, transparent 75%);
        }
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation Anchor -->
<header class="bg-[#f6fafa] dark:bg-slate-900 docked full-width top-0 z-50">
<div class="flex items-center justify-between px-6 h-16 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#006067] dark:text-[#007b83]" data-icon="psychology">psychology</span>
<h1 class="font-Inter tracking-tight text-[#181c1d] dark:text-slate-100 text-lg font-bold">ZahnPrep</h1>
</div>
<div class="flex items-center gap-4">
<div class="hidden md:flex gap-6 mr-6">
<span class="text-[#006067] font-semibold text-sm cursor-pointer">Drills</span>
<span class="text-slate-500 text-sm cursor-pointer hover:bg-[#f1f4f4] transition-colors duration-200 px-2 py-1 rounded">History</span>
</div>
<div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center text-white text-xs font-bold overflow-hidden shadow-sm">
<img alt="User profile avatar" data-alt="professional headshot of a student in a university library setting with soft natural light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCb-sSYXnAcpa_VjwM-E6-SjWSEhYdXvpnNDIQihbuiaQCC5I-tVovdVvHh-8TAr8qOL4Y4BMGqD5tm08yo8coVljGJFg-yA9Lw6UK17zZn7KX_qvXD2c4KLFfJ-bt7daHoBNZza1KzWUkyroiKwvBEps9BOmqlAZ_B7LmYPeiRlDqoO6o6ZlBDBbNUHakQgJumcjKl-cZJizlf96j-DGUpZs_VzANjQ91nbmrbWu8cfjaaEtUu7jCmuxM_EM8UWY8fG7kLWrv2tDU"/>
</div>
</div>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-6 py-8 md:py-12 max-w-4xl mx-auto w-full">
<!-- Timer Section -->
<div class="w-full flex flex-col items-center mb-12">
<div class="relative w-40 h-40 md:w-56 md:h-56 flex items-center justify-center">
<!-- Outer Progress Circle -->
<svg class="absolute inset-0 w-full h-full -rotate-90">
<circle class="text-surface-container-high" cx="50%" cy="50%" fill="transparent" r="48%" stroke="currentColor" stroke-width="6"></circle>
<circle class="text-primary" cx="50%" cy="50%" fill="transparent" r="48%" stroke="currentColor" stroke-dasharray="300" stroke-dashoffset="120" stroke-linecap="round" stroke-width="8"></circle>
</svg>
<!-- Large Countdown Text -->
<div class="text-center">
<span class="block text-6xl md:text-8xl font-black text-on-surface tracking-tighter leading-none">24</span>
<span class="text-[10px] font-bold uppercase tracking-[0.2em] text-outline opacity-70">Seconds Left</span>
</div>
</div>
<!-- Context Subtitle -->
<div class="mt-8 flex items-center gap-3 bg-primary/5 px-4 py-2 rounded-full border border-primary/10">
<span class="material-symbols-outlined text-primary text-sm" data-icon="bolt">bolt</span>
<span class="text-xs font-bold tracking-widest uppercase text-primary">30-Second Rapid Fire</span>
</div>
</div>
<!-- Question Canvas -->
<div class="w-full bg-surface-container-low rounded-full p-8 md:p-12 mb-10 shadow-sm relative overflow-hidden">
<!-- Decorative Background Element -->
<div class="absolute -top-12 -right-12 w-48 h-48 bg-primary/5 rounded-full blur-3xl"></div>
<div class="relative z-10 flex flex-col items-center text-center">
<span class="label-sm text-[11px] font-bold uppercase tracking-widest text-outline mb-4">Question 5 of 20</span>
<h2 class="text-2xl md:text-4xl font-semibold text-on-surface leading-tight max-w-2xl font-headline tracking-tight">
                    Article 32 of the Constitution?
                </h2>
<!-- Input Field -->
<div class="mt-10 w-full max-w-md">
<div class="relative group">
<input autofocus="" class="w-full bg-surface-container-lowest border-none rounded-xl px-6 py-5 text-lg font-medium shadow-sm focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline/40" placeholder="Type your answer here..." type="text"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2">
<span class="material-symbols-outlined text-primary/30 group-focus-within:text-primary transition-colors" data-icon="keyboard_return">keyboard_return</span>
</div>
</div>
<p class="mt-3 text-xs text-outline/60 italic font-medium">Press Enter to submit and continue</p>
</div>
</div>
</div>
<!-- Progress Track -->
<div class="w-full max-w-lg mb-16">
<div class="flex justify-between items-end mb-2">
<span class="text-[10px] font-bold uppercase tracking-wider text-outline">Progress</span>
<span class="text-[10px] font-bold text-primary">25% Complete</span>
</div>
<div class="h-1.5 w-full bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full transition-all duration-500" style="width: 25%"></div>
</div>
</div>
<!-- Action Footer -->
<div class="w-full flex flex-col md:flex-row items-center justify-center gap-4">
<button class="w-full md:w-40 flex items-center justify-center gap-2 px-6 py-4 rounded-xl text-primary font-bold text-sm bg-surface-container-high hover:bg-surface-container-highest transition-all active:scale-95">
<span class="material-symbols-outlined text-sm" data-icon="pause_circle">pause_circle</span>
                Pause
            </button>
<button class="w-full md:w-40 flex items-center justify-center gap-2 px-6 py-4 rounded-xl text-error font-bold text-sm border border-error/10 hover:bg-error/5 transition-all active:scale-95">
<span class="material-symbols-outlined text-sm" data-icon="logout">logout</span>
                Quit
            </button>
</div>
</main>
<!-- Bottom Navigation (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-4 pt-2 bg-[#f6fafa]/80 dark:bg-slate-900/80 backdrop-blur-xl border-t border-[#bdc9ca]/20">
<div class="flex flex-col items-center justify-center bg-[#006067] text-white rounded-xl px-4 py-1.5 transition-transform duration-200 ease-in-out">
<span class="material-symbols-outlined" data-icon="bolt" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="text-[11px] font-medium font-Inter uppercase tracking-wider">Drills</span>
</div>
<div class="flex flex-col items-center justify-center text-[#181c1d]/60 dark:text-slate-400 px-4 py-1.5 hover:text-[#006067] transition-transform duration-200 ease-in-out">
<span class="material-symbols-outlined" data-icon="timer">timer</span>
<span class="text-[11px] font-medium font-Inter uppercase tracking-wider">Simulate</span>
</div>
<div class="flex flex-col items-center justify-center text-[#181c1d]/60 dark:text-slate-400 px-4 py-1.5 hover:text-[#006067] transition-transform duration-200 ease-in-out">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="text-[11px] font-medium font-Inter uppercase tracking-wider">History</span>
</div>
<div class="flex flex-col items-center justify-center text-[#181c1d]/60 dark:text-slate-400 px-4 py-1.5 hover:text-[#006067] transition-transform duration-200 ease-in-out">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="text-[11px] font-medium font-Inter uppercase tracking-wider">Profile</span>
</div>
</nav>
<!-- High-Energy Aesthetic Gradient Overlays -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 overflow-hidden">
<div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-tertiary/5 rounded-full blur-[100px]"></div>
</div>
</body></html>
